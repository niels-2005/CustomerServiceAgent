# Retrieval, ingestion, and vector storage defaults.

storage:
  chroma_persist_dir: ".chroma" # Local Chroma persistence directory on disk.

  faq:
    collection_name: "customer_bot_faq" # Chroma collection to read/write FAQ vectors.

  products:
    collection_name: "customer_bot_products" # Chroma collection to read/write product vectors.

ingestion:
  faq:
    corpus_csv_path: "dataset/corpus.csv" # Source CSV with faq_id, question, and answer columns.
    text_ingestion_mode: "question_only" # "question_only" | "answer_only" | "question_answer".

  products:
    corpus_csv_path: "dataset/products.csv" # Source CSV with product_id, name, description, and optional product fields.

retrieval:
  faq:
    top_k: 1 # Max number of FAQ candidates requested before later filtering.
    similarity_cutoff: 0.4 # Minimum FAQ similarity score required to keep a match after the initial retrieval candidates are postprocessed and filtered.

  products:
    top_k: 1 # Max number of product candidates requested before later filtering.
    similarity_cutoff: 0.2 # Minimum product similarity score required to keep a match after the initial retrieval candidates are postprocessed and filtered.
