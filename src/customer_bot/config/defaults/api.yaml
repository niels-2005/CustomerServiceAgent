# API defaults used by the FastAPI app.
# These values define HTTP-facing behavior such as binding, request validation,
# browser access, and abuse protection. Keep environment-specific network values
# overridable via `.env`, but keep the behavioral defaults versioned here.

api:
  # Host interface the uvicorn server binds to.
  # Use "0.0.0.0" to accept traffic from outside the local machine or container.
  # Use "127.0.0.1" for local-only development.
  host: "0.0.0.0"

  # TCP port the API listens on.
  # Change this when the default 8000 conflicts with another local service or the
  # deployment platform expects a different port.
  port: 8000

  # Maximum accepted length of `POST /chat.user_message`.
  # Longer requests are rejected by API validation before they reach memory,
  # retrieval, or the agent pipeline.
  # Raise this only if longer customer messages are a real requirement.
  max_user_message_length: 500

  # Explicit browser origins allowed to call the API from frontend apps.
  # This is a hard allowlist for CORS preflight/response headers, not a hint list.
  # Add an origin when you introduce a new local or deployed frontend.
  cors_allow_origins:
    - "http://127.0.0.1:3000"
    - "http://localhost:3000"
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"

  # Whether browsers may send cookies or authenticated cross-origin requests.
  # Keep this false unless you intentionally move to credentialed browser auth.
  cors_allow_credentials: false

  # HTTP methods exposed through CORS.
  # This does not define routes; it only controls which methods browsers may use
  # cross-origin.
  cors_allow_methods:
    - "GET"
    - "POST"

  # Request headers browsers are allowed to send cross-origin.
  # Add headers here when the frontend starts sending new custom headers.
  cors_allow_headers:
    - "Content-Type"
    - "X-Request-ID" # Optional client-supplied request correlation ID for tracing and log/debug correlation. Currently not used.

  # Allowed `Host` header values enforced by TrustedHostMiddleware.
  # This protects against host-header abuse and accidental exposure on unexpected
  # hostnames. Include `testserver` for FastAPI/Starlette test clients.
  trusted_hosts:
    - "127.0.0.1"
    - "localhost"
    - "testserver"

  # Rate limiting configuration shared by SlowAPI and the API app.
  rate_limit:
    # Master switch for all API rate limiting.
    enabled: true

    # Defensive default budget applied to routes without a stricter route-level limit.
    # Keep `/health` exempt so health checks never burn the shared budget.
    default_limit: "60/minute"

    # Stricter limit for `POST /chat`, which is the expensive LLM-backed endpoint.
    chat_limit: "10/minute"

    # Expose standard rate-limit headers such as `X-RateLimit-Remaining`.
    headers_enabled: true

    # Optional external storage shared across workers and processes.
    # Set this to `redis://:myredissecret@127.0.0.1:6379/1` when using the
    # repository's local Redis container for consistent cross-process limits.
    # The `/1` Redis database avoids limiter key conflicts with Langfuse on `/0`.
    storage_uri: "redis://:myredissecret@127.0.0.1:6379/1"

    # Prefix for Redis keys created by SlowAPI/limits.
    key_prefix: "customer-bot:ratelimit"

    # Only enable forwarded-header parsing when the app is behind a trusted proxy.
    trust_proxy_headers: false
