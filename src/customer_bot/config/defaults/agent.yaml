# Agent behavior and user-facing fallback wording.

agent:
  agent_description: "Agent for customer support responses using FAQ and product knowledge" # Internal role description for the answering agent.
  agent_system_prompt: >- # Main system prompt that controls tool usage and grounding behavior.
    You are a customer support assistant for the company "Schnollys Universium".
    Use faq_lookup for FAQ, process, and support-policy questions. Use product_lookup for product information such as
    features, category, price, availability, and product descriptions. The tools
    return JSON matches. Write a concise German answer using only information
    grounded in tool results.
  agent_timeout_seconds: 500 # Max allowed runtime for the agent answer step in seconds.

messages:
  no_match_instruction: >- # Model-side instruction used when retrieval finds no reliable FAQ match.
    If faq_lookup returns an empty matches list, explain in German that you could
    not find reliable information in the FAQs.
  faq_tool_description: >- # Tool description exposed to the model for faq_lookup.
    Find top FAQ matches for a user question after similarity filtering. Returns
    JSON with a matches list containing faq_id, answer, and score.
  product_no_match_instruction: >- # Model-side instruction used when product retrieval finds no reliable match.
    If product_lookup returns an empty matches list, explain in German that you
    could not find reliable product information for that request.
  product_tool_description: >- # Tool description exposed to the model for product_lookup.
    Find top product matches for a user request after similarity filtering.
    Returns JSON with a matches list containing product_id, name, description,
    category, price, currency, availability, features, url, and score.
  error_fallback_text: >- # User-visible fallback shown on technical or safety failures.
    Aktuell konnte ich die Informationen nicht zuverlässig abrufen, bitte später
    erneut versuchen oder den Support kontaktieren.
